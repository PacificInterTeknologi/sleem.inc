<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - SLEEM Fashion Store</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64,">
    <style>
        /* Local Font Awesome Icons */
        .fa, .fas, .far, .fab {
            display: inline-block;
            font-style: normal;
            font-variant: normal;
            text-rendering: auto;
            line-height: 1;
        }
        
        .fa-user:before { content: "👤"; }
        .fa-lock:before { content: "🔒"; }
        .fa-gem:before { content: "💎"; }
        .fa-sign-out-alt:before { content: "🚪"; }
        .fa-home:before { content: "🏠"; }
        .fa-check:before { content: "✅"; }
        .fa-exclamation-circle:before { content: "⚠️"; }
        .fa-arrow-left:before { content: "⬅️"; }
        
        :root {
            --admin-primary: #e91e63;
            --admin-secondary: #9c27b0;
            --admin-success: #4caf50;
            --admin-warning: #ff9800;
            --admin-danger: #f44336;
            --admin-info: #2196f3;
            --admin-dark: #212121;
            --admin-light: #f5f5f5;
            --admin-sidebar: #263238;
            --admin-sidebar-text: #eceff1;
        }
        
        body {
            background: linear-gradient(135deg, var(--admin-primary) 0%, var(--admin-secondary) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
        }
        
        .admin-login-container {
            width: 100%;
            max-width: 450px;
            padding: 2rem;
        }
        
        .admin-login-card {
            background: var(--white);
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 3rem;
            position: relative;
            overflow: hidden;
        }
        
        .admin-login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: var(--gradient-primary);
        }
        
        .admin-login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        
        .admin-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .admin-logo i {
            font-size: 4rem;
            color: var(--admin-primary);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .admin-logo h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--admin-primary);
            margin: 0;
        }
        
        .admin-logo span {
            font-size: 1rem;
            color: var(--admin-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .admin-login-header h2 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--admin-dark);
            margin-bottom: 0.5rem;
        }
        
        .admin-login-header p {
            color: var(--text-secondary);
            font-size: 1rem;
            margin: 0;
        }
        
        .admin-login-form {
            margin-bottom: 2rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
            font-weight: 600;
            color: var(--admin-dark);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .form-label i {
            font-size: 1.25rem;
            color: var(--admin-primary);
            width: 24px;
            text-align: center;
        }
        
        .form-control {
            width: 100%;
            padding: 1rem 1.25rem;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            background: var(--admin-light);
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--admin-primary);
            box-shadow: 0 0 0 4px rgba(233, 30, 99, 0.1);
            background: var(--white);
        }
        
        .form-control::placeholder {
            color: var(--text-secondary);
            font-style: italic;
        }
        
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.875rem;
            color: var(--admin-dark);
            cursor: pointer;
            font-weight: 500;
        }
        
        .checkbox-label input[type="checkbox"] {
            margin: 0;
            width: 18px;
            height: 18px;
            accent-color: var(--admin-primary);
        }
        
        .forgot-password {
            color: var(--admin-primary);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        
        .forgot-password:hover {
            color: var(--admin-secondary);
            text-decoration: underline;
        }
        
        .btn-admin-login {
            width: 100%;
            background: var(--gradient-primary);
            color: var(--white);
            border: none;
            border-radius: 12px;
            padding: 1.25rem;
            font-size: 1.125rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            box-shadow: 0 4px 15px rgba(233, 30, 99, 0.3);
        }
        
        .btn-admin-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 30, 99, 0.4);
        }
        
        .btn-admin-login:active {
            transform: translateY(0);
        }
        
        .admin-login-footer {
            text-align: center;
        }
        
        .admin-login-footer p {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }
        
        .admin-login-footer a {
            color: var(--admin-primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        
        .admin-login-footer a:hover {
            color: var(--admin-secondary);
            text-decoration: underline;
        }
        
        .back-to-store {
            margin-top: 2rem;
            text-align: center;
        }
        
        .back-to-store a {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--white);
            text-decoration: none;
            font-weight: 500;
            padding: 0.75rem 1.5rem;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .back-to-store a:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--admin-success);
            color: var(--white);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 1002;
            animation: slideIn 0.3s ease-out;
            max-width: 350px;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .notification.hidden {
            display: none;
        }
        
        .notification-content {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .notification.error {
            background: var(--admin-danger);
        }
        
        .notification.warning {
            background: var(--admin-warning);
        }
        
        @media (max-width: 768px) {
            .admin-login-container {
                padding: 1rem;
            }
            
            .admin-login-card {
                padding: 2rem;
            }
            
            .admin-logo i {
                font-size: 3rem;
            }
            
            .admin-logo h1 {
                font-size: 2rem;
            }
            
            .admin-login-header h2 {
                font-size: 1.5rem;
            }
            
            .form-options {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="admin-login-container">
        <div class="admin-login-card">
            <div class="admin-login-header">
                <div class="admin-logo">
                    <i class="fas fa-gem"></i>
                    <h1>SLEEM</h1>
                    <span>Admin Panel</span>
                </div>
                <h2>Login Administrator</h2>
                <p>Masuk ke dashboard admin SLEEM Fashion Store</p>
            </div>
            
            <form id="adminLoginForm" class="admin-login-form">
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-user"></i>
                        Username
                    </label>
                    <input type="text" class="form-control" id="adminUsername" placeholder="Masukkan username admin" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <input type="password" class="form-control" id="adminPassword" placeholder="Masukkan password admin" required>
                </div>
                
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <span>Ingat saya</span>
                    </label>
                    <a href="#" class="forgot-password">Lupa password?</a>
                </div>
                
                <button type="submit" class="btn-admin-login">
                    <i class="fas fa-sign-out-alt"></i>
                    Login Admin
                </button>
            </form>
            
            <div class="admin-login-footer">
                <p>Butuh bantuan? Hubungi IT Support</p>
                <a href="mailto:admin@sleem.com">admin@sleem.com</a>
            </div>
        </div>
        
        <div class="back-to-store">
            <a href="../index.html">
                <i class="fas fa-arrow-left"></i>
                Kembali ke Toko
            </a>
        </div>
    </div>
    
    <!-- Notification -->
    <div id="notification" class="notification hidden">
        <div class="notification-content">
            <i class="fas fa-check"></i>
            <span id="notificationMessage"></span>
        </div>
    </div>
    
    <script>
        // Admin Login JavaScript
        document.addEventListener('DOMContentLoaded', function() {
            setupAdminLogin();
        });
        
        function setupAdminLogin() {
            const form = document.getElementById('adminLoginForm');
            form.addEventListener('submit', handleAdminLogin);
            
            // Check if already logged in
            checkAdminAuth();
        }
        
        function handleAdminLogin(e) {
            e.preventDefault();
            
            const username = document.getElementById('adminUsername').value.trim();
            const password = document.getElementById('adminPassword').value.trim();
            const rememberMe = document.getElementById('rememberMe').checked;
            
            // Validate input
            if (!username || !password) {
                showNotification('Mohon isi username dan password', 'error');
                return;
            }
            
            // Demo admin credentials (in real app, this would be server-side)
            if (username === 'admin' && password === 'admin123') {
                // Login successful
                const adminData = {
                    username: username,
                    name: 'Administrator',
                    email: 'admin@sleem.com',
                    role: 'admin',
                    loginTime: new Date().toISOString()
                };
                
                // Save session
                if (rememberMe) {
                    localStorage.setItem('sleemAdmin', JSON.stringify(adminData));
                } else {
                    sessionStorage.setItem('sleemAdmin', JSON.stringify(adminData));
                }
                
                showNotification('Login berhasil! Mengarahkan ke dashboard...');
                
                // Redirect to dashboard
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
                
            } else {
                // Login failed
                showNotification('Username atau password salah', 'error');
                
                // Clear password field
                document.getElementById('adminPassword').value = '';
                document.getElementById('adminPassword').focus();
            }
        }
        
        function checkAdminAuth() {
            const savedAdmin = localStorage.getItem('sleemAdmin') || sessionStorage.getItem('sleemAdmin');
            if (savedAdmin) {
                try {
                    const adminData = JSON.parse(savedAdmin);
                    if (adminData.role === 'admin') {
                        // Already logged in, redirect to dashboard
                        window.location.href = 'dashboard.html';
                    }
                } catch (e) {
                    // Invalid data, clear storage
                    localStorage.removeItem('sleemAdmin');
                    sessionStorage.removeItem('sleemAdmin');
                }
            }
        }
        
        function forgotPassword() {
            const username = prompt('Masukkan username admin:');
            if (username) {
                // In a real app, this would send a reset email
                showNotification('Link reset password telah dikirim ke email admin', 'success');
            }
        }
        
        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            const messageElement = document.getElementById('notificationMessage');
            
            if (notification && messageElement) {
                messageElement.textContent = message;
                notification.className = 'notification';
                
                if (type === 'error') {
                    notification.classList.add('error');
                } else if (type === 'warning') {
                    notification.classList.add('warning');
                }
                
                notification.classList.remove('hidden');
                
                setTimeout(() => {
                    notification.classList.add('hidden');
                }, 3000);
            }
        }
        
        // Handle forgot password link
        document.querySelector('.forgot-password').addEventListener('click', function(e) {
            e.preventDefault();
            forgotPassword();
        });
    </script>
</body>
</html>
