<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SLEEM Fashion Store</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64,">
    <style>
        /* Local Font Awesome Icons */
        .fa, .fas, .far, .fab {
            display: inline-block;
            font-style: normal;
            font-variant: normal;
            text-rendering: auto;
            line-height: 1;
        }
        
        .fa-user:before { content: "👤"; }
        .fa-phone:before { content: "📞"; }
        .fa-lock:before { content: "🔒"; }
        .fa-envelope:before { content: "📧"; }
        .fa-home:before { content: "🏠"; }
        .fa-gem:before { content: "💎"; }
        .fa-heart:before { content: "❤️"; }
        .fa-check:before { content: "✅"; }
        .fa-exclamation-circle:before { content: "⚠️"; }
        .fa-arrow-left:before { content: "⬅️"; }
        .fa-sparkles:before { content: "✨"; }
        .fa-calendar:before { content: "📅"; }
        .fa-map-marker-alt:before { content: "📍"; }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <div class="logo">
                    <i class="fas fa-gem"></i>
                    <h1>SLEEM</h1>
                    <span>Fashion Store</span>
                </div>
                <p>Buat akun baru</p>
            </div>
            
            <form id="registerForm" class="register-form">
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-user"></i>
                        Nama Lengkap
                    </label>
                    <input type="text" class="form-control" id="fullName" placeholder="Masukkan nama lengkap" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-phone"></i>
                        Nomor HP / WhatsApp
                    </label>
                    <input type="tel" class="form-control" id="phone" placeholder="0812-3456-7890" required>
                    <small>Nomor HP akan digunakan untuk login</small>
                </div>
                
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-envelope"></i>
                        Email (Opsional)
                    </label>
                    <input type="email" class="form-control" id="email" placeholder="email@example.com">
                </div>
                
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-calendar"></i>
                        Tanggal Lahir
                    </label>
                    <input type="date" class="form-control" id="birthdate">
                </div>
                
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-map-marker-alt"></i>
                        Alamat
                    </label>
                    <textarea class="form-control" id="address" placeholder="Masukkan alamat lengkap" rows="3"></textarea>
                </div>
                
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <input type="password" class="form-control" id="password" placeholder="Minimal 6 karakter" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-lock"></i>
                        Konfirmasi Password
                    </label>
                    <input type="password" class="form-control" id="confirmPassword" placeholder="Ulangi password" required>
                </div>
                
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="agreeTerms" required>
                        <span>Saya setuju dengan <a href="#" class="terms-link">Syarat & Ketentuan</a></span>
                    </label>
                </div>
                
                <button type="submit" class="btn-primary btn-full">
                    <i class="fas fa-user"></i>
                    Daftar Sekarang
                </button>
            </form>
            
            <div class="register-footer">
                <p>Sudah punya akun? <a href="login.html">Login</a></p>
                <div class="social-login">
                    <p>Atau daftar dengan:</p>
                    <div class="social-buttons">
                        <button class="btn-social btn-google">
                            <span>G</span> Google
                        </button>
                        <button class="btn-social btn-facebook">
                            <span>f</span> Facebook
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="back-to-home">
                <a href="index.html">
                    <i class="fas fa-arrow-left"></i>
                    Kembali ke Beranda
                </a>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div id="notification" class="notification hidden">
        <div class="notification-content">
            <i class="fas fa-check"></i>
            <span id="notificationMessage"></span>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
