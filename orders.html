        :root {
            --admin-primary: #e91e63;
            --admin-secondary: #9c27b0;
            --admin-success: #4caf50;
            --admin-warning: #ff9800;
            --admin-danger: #f44336;
            --admin-info: #2196f3;
            --admin-dark: #212121;
            --admin-light: #f5f5f5;
            --admin-sidebar: #263238;
            --admin-sidebar-text: #eceff1;
        }
        
        body {
            background: var(--admin-light);
        }
        
        .admin-layout {
            display: flex;
            min-height: 100vh;
        }
        
        .admin-sidebar {
            width: 250px;
            background: var(--admin-sidebar);
            color: var(--admin-sidebar-text);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 1000;
        }
        
        .admin-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .admin-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .admin-logo i {
            font-size: 2rem;
            color: var(--admin-primary);
        }
        
        .admin-logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--white);
            margin: 0;
        }
        
        .admin-logo span {
            font-size: 0.75rem;
            color: var(--admin-sidebar-text);

        }
        
        .admin-nav {
            padding: 1rem 0;
        }
        
        .admin-nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .admin-nav li {
            margin-bottom: 0.25rem;
        }
        
        .admin-nav a {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1.5rem;
            color: var(--admin-sidebar-text);
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        .admin-nav a:hover,
        .admin-nav a.active {
            background: rgba(255, 255, 255, 0.1);
            color: var(--admin-primary);
        }
        
        .admin-nav a.active {
            background: var(--admin-primary);
            color: var(--white);
        }
        
        .admin-main {
            flex: 1;
            margin-left: 250px;
            padding: 2rem;
        }
        
        .admin-topbar {
            background: var(--white);
            border-radius: 15px;
            padding: 1rem 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .admin-user {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .admin-user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--admin-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-weight: 600;
        }
        
        .admin-user-info h4 {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--admin-dark);
            margin: 0;
        }
        
        .admin-user-info p {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin: 0;
        }
        
        .admin-actions {
            display: flex;
            gap: 1rem;
        }
        
        .btn-admin {
            background: var(--admin-primary);
            color: var(--white);
            border: none;
            border-radius: 8px;
            padding: 0.5rem 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-admin:hover {
            background: var(--admin-secondary);
            transform: translateY(-2px);
        }
        
        .admin-content {
            background: var(--white);
            border-radius: 15px;
            padding: 2rem;
            box-shadow: var(--shadow-md);
        }
        
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .content-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--admin-dark);
            margin: 0;
        }
        
        .content-actions {
            display: flex;
            gap: 1rem;
        }
        
        .btn-primary-admin {
            background: var(--admin-primary);
            color: var(--white);
            border: none;
            border-radius: 8px;
            padding: 0.75rem 1.5rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-primary-admin:hover {
            background: var(--admin-secondary);
            transform: translateY(-2px);
        }
        
        .btn-secondary-admin {
            background: var(--white);
            color: var(--admin-primary);
            border: 2px solid var(--admin-primary);
            border-radius: 8px;
            padding: 0.75rem 1.5rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-secondary-admin:hover {
            background: var(--admin-primary);
            color: var(--white);
        }
        
        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .filters select,
        .filters input {
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--white);
            font-size: 0.875rem;
        }
        
        .filters input {
            flex: 1;
        }
        
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        
        .admin-table th,
        .admin-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        
        .admin-table th {
            background: var(--admin-light);
            font-weight: 600;
            color: var(--admin-dark);
        }
        
        .admin-table tr:hover {
            background: rgba(233, 30, 99, 0.05);
        }
        
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .status-badge.pending {
            background: var(--admin-warning);
            color: var(--white);
        }
        
        .status-badge.processing {
            background: var(--admin-info);
            color: var(--white);
        }
        
        .status-badge.completed {
            background: var(--admin-success);
            color: var(--white);
        }
        
        .status-badge.cancelled {
            background: var(--admin-danger);
            color: var(--white);
        }

            display: flex;
            gap: 0.5rem;

            padding: 0.5rem;
            border-radius: 5px;

            color: var(--text-secondary);

            color: var(--admin-primary);

            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;

            padding: 0.5rem 1rem;
            border: 1px solid var(--border-color);
            background: var(--white);
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .pagination button:hover {
            background: var(--admin-primary);
            color: var(--white);
            border-color: var(--admin-primary);
        }
        
        .pagination button.active {
            background: var(--admin-primary);
            color: var(--white);
            border-color: var(--admin-primary);
        }
        
        /* Order Detail Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: var(--white);
            border-radius: 15px;
            box-shadow: var(--shadow-lg);
            max-width: 90%;
            max-height: 90%;
            overflow-y: auto;
            animation: modalSlideIn 0.3s ease-out;
        }
        
        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h3 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--admin-dark);
            margin: 0;
        }
        
        .modal-header button {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }
        
        .modal-body {
            padding: 1.5rem;
        }
        
        .order-detail-section {
            margin-bottom: 2rem;
        }
        
        .order-detail-section h4 {
            color: var(--admin-primary);
            margin-bottom: 1rem;
            font-size: 1.125rem;
        }
        
        .order-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }
        
        .order-info-item {
            padding: 1rem;
            background: var(--admin-light);
            border-radius: 8px;
        }
        
        .order-info-item strong {
            display: block;
            color: var(--admin-dark);
            margin-bottom: 0.25rem;
        }
        
        .order-items-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        
        .order-item:last-child {
            border-bottom: none;
        }
        
        .order-item-info {
            flex: 1;
        }
        
        .order-item-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        
        .order-item-details {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        .order-item-price {
            font-weight: 600;
            color: var(--admin-primary);
        }
        
        .order-totals {
            background: var(--admin-light);
            padding: 1rem;
            border-radius: 8px;
        }
        
        .total-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }
        
        .total-row:last-child {
            margin-bottom: 0;
            padding-top: 0.5rem;
            border-top: 2px solid var(--admin-primary);
            font-weight: 700;
            font-size: 1.125rem;
            color: var(--admin-primary);
        }
        
        .status-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .btn-status {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-status.processing {
            background: var(--admin-info);
            color: var(--white);
        }
        
        .btn-status.completed {
            background: var(--admin-success);
            color: var(--white);
        }
        
        .btn-status.cancelled {
            background: var(--admin-danger);
            color: var(--white);
        }
        
        .btn-status:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        @media (max-width: 768px) {
            .admin-sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            
            .admin-sidebar.active {
                transform: translateX(0);
            }
            
            .admin-main {
                margin-left: 0;
            }
            
            .content-header {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }
            
            .filters {
                flex-direction: column;
            }
            
            .order-info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

                        </button>
                        <button class="btn-primary-admin" onclick="refreshOrders()">
                            <i class="fas fa-sync"></i> Refresh
                        </button>
                    </div>
                </div>
                
                <div class="filters">
                    <input type="text" placeholder="Cari pesanan..." id="orderSearch" onkeyup="searchOrders()">
                    <select id="statusFilter" onchange="filterOrders()">
                        <option value="">Semua Status</option>
                        <option value="pending">Pending</option>
                        <option value="processing">Processing</option>
                        <option value="completed">Completed</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                    <select id="dateFilter" onchange="filterOrders()">
                        <option value="">Semua Tanggal</option>
                        <option value="today">Hari Ini</option>
                        <option value="week">Minggu Ini</option>
                        <option value="month">Bulan Ini</option>
                    </select>
                    <select id="paymentFilter" onchange="filterOrders()">
                        <option value="">Semua Pembayaran</option>
                        <option value="transfer">Transfer</option>
                        <option value="cod">COD</option>
                    </select>
                </div>
                
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Tanggal</th>
                            <th>Items</th>
                            <th>Total</th>
                            <th>Payment</th>
                            <th>Status</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTable">
                        <!-- Orders will be loaded here -->
                    </tbody>
                </table>
                
                <div class="pagination">
                    <button onclick="previousPage()">Previous</button>
                    <button class="active">1</button>
                    <button onclick="nextPage()">Next</button>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Order Detail Modal -->
    <div id="orderDetailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Detail Pesanan</h3>
                <button onclick="closeOrderDetailModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="orderDetailContent">
                <!-- Order details will be loaded here -->
            </div>
        </div>
    </div>
    
    <!-- Notification -->
    <div id="notification" class="notification hidden">
        <div class="notification-content">
            <i class="fas fa-check"></i>
            <span id="notificationMessage"></span>
        </div>
    </div>

                            province: 'Jawa Timur',
                            postalCode: '60234'
                        },
                        notes: '',
                        createdAt: '2024-03-25T09:45:00',
                        updatedAt: '2024-03-25T18:30:00'
                    }
                ];
                saveOrdersToStorage();
            }
        }
        
        // Save orders to localStorage
        function saveOrdersToStorage() {
            localStorage.setItem('sleemOrders', JSON.stringify(orders));
        }
        
        // Load orders table
        function loadOrdersTable() {
            const tbody = document.getElementById('ordersTable');
            tbody.innerHTML = '';
            
            orders.forEach(order => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td><strong>${order.id}</strong></td>
                    <td>
                        <div>${order.customerName}</div>
                        <small>${order.customerPhone}</small>
                    </td>
                    <td>${formatDate(order.date)}</td>
                    <td>
                        <div class="order-items-preview">
                            ${order.items.length} item${order.items.length > 1 ? 's' : ''}
                        </div>
                    </td>
                    <td class="order-total">Rp ${order.total.toLocaleString('id-ID')}</td>
                    <td>${order.paymentMethod.toUpperCase()}</td>
                    <td><span class="status-badge ${order.status}">${order.status}</span></td>
                    <td>
                        <div class="table-actions">
                            <button class="btn-action view" onclick="viewOrderDetail('${order.id}')" title="View">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button class="btn-action edit" onclick="updateOrderStatus('${order.id}')" title="Update Status">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn-action delete" onclick="cancelOrder('${order.id}')" title="Cancel">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </td>
                `;
            });
        }
        
        // View order detail
        function viewOrderDetail(orderId) {
            const order = orders.find(o => o.id === orderId);
            if (order) {
                currentOrder = order;
                displayOrderDetail(order);
                document.getElementById('orderDetailModal').style.display = 'flex';
            }
        }
        
        // Display order detail
        function displayOrderDetail(order) {
            const content = document.getElementById('orderDetailContent');
            content.innerHTML = `
                <div class="order-detail-section">
                    <h4>Informasi Pesanan</h4>
                    <div class="order-info-grid">
                        <div class="order-info-item">
                            <strong>Order ID</strong>
                            ${order.id}
                        </div>
                        <div class="order-info-item">
                            <strong>Tanggal</strong>
                            ${formatDate(order.date)}
                        </div>
                        <div class="order-info-item">
                            <strong>Status</strong>
                            <span class="status-badge ${order.status}">${order.status}</span>
                        </div>
                        <div class="order-info-item">
                            <strong>Metode Pembayaran</strong>
                            ${order.paymentMethod.toUpperCase()}
                        </div>
                    </div>
                </div>
                
                <div class="order-detail-section">
                    <h4>Informasi Customer</h4>
                    <div class="order-info-grid">
                        <div class="order-info-item">
                            <strong>Nama</strong>
                            ${order.customerName}
                        </div>
                        <div class="order-info-item">
                            <strong>Telepon</strong>
                            ${order.customerPhone}
                        </div>
                        <div class="order-info-item">
                            <strong>Email</strong>
                            ${order.customerEmail}
                        </div>
                        <div class="order-info-item">
                            <strong>Customer ID</strong>
                            ${order.customerId}
                        </div>
                    </div>
                </div>
                
                <div class="order-detail-section">
                    <h4>Alamat Pengiriman</h4>
                    <div class="order-info-grid">
                        <div class="order-info-item">
                            <strong>Alamat</strong>
                            ${order.shippingAddress.address}
                        </div>
                        <div class="order-info-item">
                            <strong>Kota</strong>
                            ${order.shippingAddress.city}
                        </div>
                        <div class="order-info-item">
                            <strong>Provinsi</strong>
                            ${order.shippingAddress.province}
                        </div>
                        <div class="order-info-item">
                            <strong>Kode Pos</strong>
                            ${order.shippingAddress.postalCode}
                        </div>
                    </div>
                </div>
                
                <div class="order-detail-section">
                    <h4>Detail Pesanan</h4>
                    <div class="order-items-list">
                        ${order.items.map(item => `
                            <div class="order-item">
                                <div class="order-item-info">
                                    <div class="order-item-name">${item.name}</div>
                                    <div class="order-item-details">
                                        Size: ${item.size.toUpperCase()}, Color: ${item.color}, Qty: ${item.quantity}
                                    </div>
                                </div>
                                <div class="order-item-price">
                                    Rp ${item.total.toLocaleString('id-ID')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div class="order-totals">
                        <div class="total-row">
                            <span>Subtotal:</span>
                            <span>Rp ${order.subtotal.toLocaleString('id-ID')}</span>
                        </div>
                        <div class="total-row">
                            <span>Ongkir:</span>
                            <span>Rp ${order.shipping.toLocaleString('id-ID')}</span>
                        </div>
                        <div class="total-row">
                            <span>Total:</span>
                            <span>Rp ${order.total.toLocaleString('id-ID')}</span>
                        </div>
                    </div>
                </div>
                
                ${order.notes ? `
                    <div class="order-detail-section">
                        <h4>Catatan</h4>
                        <p>${order.notes}</p>
                    </div>
                ` : ''}
                
                <div class="order-detail-section">
                    <h4>Update Status</h4>
                    <div class="status-actions">
                        ${order.status !== 'processing' ? '<button class="btn-status processing" onclick="changeOrderStatus(\'processing\')">Proses</button>' : ''}
                        ${order.status !== 'completed' ? '<button class="btn-status completed" onclick="changeOrderStatus(\'completed\')">Selesai</button>' : ''}
                        ${order.status !== 'cancelled' ? '<button class="btn-status cancelled" onclick="changeOrderStatus(\'cancelled\')">Batal</button>' : ''}
                    </div>
                </div>
            `;
        }
        
        // Close order detail modal
        function closeOrderDetailModal() {
            document.getElementById('orderDetailModal').style.display = 'none';
            currentOrder = null;
        }
        
        // Update order status
        function updateOrderStatus(orderId) {
            viewOrderDetail(orderId);
        }
        
        // Change order status
        function changeOrderStatus(newStatus) {
            if (currentOrder) {
                const oldStatus = currentOrder.status;
                currentOrder.status = newStatus;
                currentOrder.updatedAt = new Date().toISOString();
                
                // Update in orders array
                const index = orders.findIndex(o => o.id === currentOrder.id);
                if (index > -1) {
                    orders[index] = currentOrder;
                    saveOrdersToStorage();
                    loadOrdersTable();
                    displayOrderDetail(currentOrder);
                    showNotification(`Status pesanan diubah dari ${oldStatus} menjadi ${newStatus}`);
                }
            }
        }
        
        // Cancel order
        function cancelOrder(orderId) {
            if (confirm('Apakah Anda yakin ingin membatalkan pesanan ini?')) {
                const order = orders.find(o => o.id === orderId);
                if (order) {
                    order.status = 'cancelled';
                    order.updatedAt = new Date().toISOString();
                    saveOrdersToStorage();
                    loadOrdersTable();
                    showNotification('Pesanan berhasil dibatalkan');
                }
            }
        }
        
        // Search orders
        function searchOrders() {
            const searchTerm = document.getElementById('orderSearch').value.toLowerCase();
            const filteredOrders = orders.filter(order => 
                order.id.toLowerCase().includes(searchTerm) ||
                order.customerName.toLowerCase().includes(searchTerm) ||
                order.customerPhone.includes(searchTerm)
            );
            
            displayOrders(filteredOrders);
        }
        
        // Filter orders
        function filterOrders() {
            const statusFilter = document.getElementById('statusFilter').value;
            const dateFilter = document.getElementById('dateFilter').value;
            const paymentFilter = document.getElementById('paymentFilter').value;
            
            let filteredOrders = orders;
            
            if (statusFilter) {
                filteredOrders = filteredOrders.filter(order => order.status === statusFilter);
            }
            
            if (paymentFilter) {
                filteredOrders = filteredOrders.filter(order => order.paymentMethod === paymentFilter);
            }
            
            if (dateFilter) {
                const today = new Date();
                filteredOrders = filteredOrders.filter(order => {
                    const orderDate = new Date(order.date);
                    switch(dateFilter) {
                        case 'today':
                            return orderDate.toDateString() === today.toDateString();
                        case 'week':
                            const weekAgo = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);
                            return orderDate >= weekAgo;
                        case 'month':
                            return orderDate.getMonth() === today.getMonth() && 
                                   orderDate.getFullYear() === today.getFullYear();
                        default:
                            return true;
                    }
                });
            }
            
            displayOrders(filteredOrders);
        }
        
        // Display orders
        function displayOrders(ordersToDisplay) {
            const tbody = document.getElementById('ordersTable');
            tbody.innerHTML = '';
            
            ordersToDisplay.forEach(order => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td><strong>${order.id}</strong></td>
                    <td>
                        <div>${order.customerName}</div>
                        <small>${order.customerPhone}</small>
                    </td>
                    <td>${formatDate(order.date)}</td>
                    <td>
                        <div class="order-items-preview">
                            ${order.items.length} item${order.items.length > 1 ? 's' : ''}
                        </div>
                    </td>
                    <td class="order-total">Rp ${order.total.toLocaleString('id-ID')}</td>
                    <td>${order.paymentMethod.toUpperCase()}</td>
                    <td><span class="status-badge ${order.status}">${order.status}</span></td>
                    <td>
                        <div class="table-actions">
                            <button class="btn-action view" onclick="viewOrderDetail('${order.id}')" title="View">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button class="btn-action edit" onclick="updateOrderStatus('${order.id}')" title="Update Status">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn-action delete" onclick="cancelOrder('${order.id}')" title="Cancel">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </td>
                `;
            });
        }
        
        // Export orders
        function exportOrders() {
            const csvContent = "data:text/csv;charset=utf-8," 
                + "Order ID,Customer,Phone,Email,Date,Items,Total,Payment,Status,Address\n"
                + orders.map(o => `${o.id},${o.customerName},${o.customerPhone},${o.customerEmail},${o.date},${o.items.length},Rp ${o.total},${o.paymentMethod},${o.status},"${o.shippingAddress.address}, ${o.shippingAddress.city}"`).join("\n");
            
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "orders_export.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            showNotification('Orders exported successfully');
        }
        
        // Refresh orders
        function refreshOrders() {
            loadOrdersFromStorage();
            loadOrdersTable();
            showNotification('Orders refreshed successfully');
        }
        
        // Pagination
        function previousPage() {
            if (currentPage > 1) {
                currentPage--;
                loadOrdersTable();
            }
        }
        
        function nextPage() {
            currentPage++;
            loadOrdersTable();
        }
        
        // Admin logout
        function adminLogout() {
            if (confirm('Are you sure you want to logout?')) {
                window.location.href = '../login.html';
            }
        }
        
        // Format date
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('id-ID', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }
        
        // Show notification
        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            const messageElement = document.getElementById('notificationMessage');
            
            if (notification && messageElement) {
                messageElement.textContent = message;
                notification.className = 'notification';
                
                if (type === 'error') {
                    notification.style.background = 'var(--admin-danger)';
                } else if (type === 'warning') {
                    notification.style.background = 'var(--admin-warning)';
                } else {
                    notification.style.background = 'var(--admin-success)';
                }
                
                notification.classList.remove('hidden');
                
                setTimeout(() => {
                    notification.classList.add('hidden');
                }, 3000);
            }
        }
    </script>
</body>
